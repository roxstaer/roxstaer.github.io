<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roxstaer</title>

    <meta property="og:title" content="Roxstaer 🎀">
    <meta property="og:description" content="@roxstaer kişisel sayfası.">
    <meta property="og:image" content="https://i.pinimg.com/originals/11/4d/91/114d9133604f76261073801264375330.jpg">
    <meta property="og:url" content="https://roxstaer.github.io/">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:image" content="https://i.pinimg.com/originals/11/4d/91/114d9133604f76261073801264375330.jpg">

    <style>
        body {
            background: linear-gradient(135deg,#ff9acb,#ff66a3,#ffb6d9);
            height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Arial;
            color: white;
            text-align: center;
            overflow: hidden;
        }
        .card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(255,105,180,0.6);
            z-index: 1;
        }
        h1 { font-size: 45px; margin-bottom: 10px; }
        p { opacity: 0.9; }
        .btn {
            margin-top: 20px;
            display: inline-block;
            padding: 12px 25px;
            background: #ff4fa0;
            border-radius: 25px;
            text-decoration: none;
            color: white;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn:hover { background: #ff1f87; transform: scale(1.1); }
        .hearts { position: absolute; width: 100%; height: 100%; top: 0; left: 0; overflow: hidden; }
        .hearts span { position: absolute; color: #ff69b4; font-size: 20px; animation: float 6s linear infinite; bottom: -50px; }
        @keyframes float {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-110vh); opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="hearts">
        <span style="left:10%;">❤</span>
        <span style="left:30%; animation-delay:1s;">❤</span>
        <span style="left:50%; animation-delay:2s;">❤</span>
        <span style="left:70%; animation-delay:3s;">❤</span>
        <span style="left:90%; animation-delay:4s;">❤</span>
    </div>
    <div class="card">
        <h1>🎀 Roxstaer</h1>
        <p>@roxstaer</p>
        <a class="btn" href="https://instagram.com/roxstaer" target="_blank">
            Instagram'a Git 💕
        </a>
    </div>
</body>
</html>
